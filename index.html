                let valJugadores = parseInt(elJugadores.textContent.replace(/\D/g, '')) || 6124;

                }, Math.floor(Math.random() * 3000) + 2000);
            }

            // --- ENGINE 3: BOTE ACUMULADO (SUBIDA DE CENTAVOS CONTINUA) ---
            const elBote = document.getElementById("stats-bote");

            }
        });

                from { opacity: 0; backdrop-filter: blur(0px); }

                from { transform: scale(0.92); opacity: 0; }

// SISTEMA DE AUDIO NATIVO OPTIMIZADO (FONDO FIJO)
// ============================================
const AudioCasino = {
    ctx: null,
    oscFondo: null,
    gainFondo: null,

    init() {
        if (!this.ctx) {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        }
    },

    // Inicia un hilo de sonido ambiental continuo e infinito sin trabar el navegador
    initMúsicaFondo() {
        this.init();
        if (this.oscFondo) return; // Evitar duplicados

        this.oscFondo = this.ctx.createOscillator();
        this.gainFondo = this.ctx.createGain();

        this.oscFondo.type = 'sine';
        // Tono muy bajo, gordo y sutil para simular el ambiente eléctrico de un casino (90Hz)
        this.oscFondo.frequency.setValueAtTime(90, this.ctx.currentTime); 

        // Volumen inicial en cero absoluto para evitar bloqueos del navegador
        this.gainFondo.gain.setValueAtTime(0, this.ctx.currentTime);

        this.oscFondo.connect(this.gainFondo);
        this.gainFondo.connect(this.ctx.destination);
        this.oscFondo.start(0);

        // Subida de volumen progresiva y súper suave (fade-in) para que el navegador lo acepte
        this.gainFondo.gain.linearRampToValueAtTime(0.015, this.ctx.currentTime + 3.0);
    },

    // Sonido sutil para botones y clics normales
    playClick() {
        this.init();
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);

        osc.type = 'sine';
        osc.frequency.setValueAtTime(600, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(150, this.ctx.currentTime + 0.1);

        gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1);

        osc.start();
        osc.stop(this.ctx.currentTime + 0.1);
    },

    // Alerta de éxito: Arpegio ascendente tipo premio
    playExito() {
        this.init();
        const notas = [523.25, 659.25, 783.99, 1046.50]; 
        notas.forEach((nota, i) => {
            setTimeout(() => {
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);

                osc.type = 'triangle';
                osc.frequency.setValueAtTime(nota, this.ctx.currentTime);

                gain.gain.setValueAtTime(0.15, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.3);

                osc.start();
                osc.stop(this.ctx.currentTime + 0.3);
            }, i * 80);
        });
    },

    // Alerta de error / bloqueo: Tono grave descendente
    playError() {
        this.init();
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);

        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(180, this.ctx.currentTime);
        osc.frequency.linearRampToValueAtTime(70, this.ctx.currentTime + 0.3);

        gain.gain.setValueAtTime(0.15, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.3);

        osc.start();
        osc.stop(this.ctx.currentTime + 0.3);
    },

    // Alerta informativa o advertencia
    playInfo() {
        this.init();
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);

        osc.type = 'sine';
        osc.frequency.setValueAtTime(440, this.ctx.currentTime);
        osc.frequency.setValueAtTime(554, this.ctx.currentTime + 0.1);

        gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.25);

        osc.start();
        osc.stop(this.ctx.currentTime + 0.25);
    }
};

// Capturador de interacciones globales corregido
document.addEventListener('click', () => {
    // Si el AudioContext estaba pausado por restricciones del navegador, lo despierta
    if (AudioCasino.ctx && AudioCasino.ctx.state === 'suspended') {
        AudioCasino.ctx.resume();
    }
    
    // Ejecuta el clic mecánico normal
    AudioCasino.playClick(); 
    
    // Fuerza el inicio del bucle infinito de sonido de fondo en el primer clic real del usuario
