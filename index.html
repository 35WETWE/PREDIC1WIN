<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PREDIC 1 WIN - PREMIUM</title>
    <style>
        :root {
            --primary: #E7180B;
            --bg-dark: #0f0f0f;
            --card-bg: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: var(--bg-dark);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; /* Evita scrolls raros en la raíz */
        }

        /* DISEÑO ADAPTATIVO: 100% en móvil, centrado en pantallas grandes */
        .app-shell {
            width: 100%;
            max-width: 500px; /* Ancho máximo para PC */
            height: 100vh;
            margin: 0 auto;
            background: var(--card-bg);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        .header {
            background: var(--primary);
            padding: 15px;
            text-align: center;
            color: white;
            font-weight: 900;
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 10;
        }

        .history {
            background: #000;
            padding: 10px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            min-height: 45px;
            align-items: center;
        }
        .history::-webkit-scrollbar { display: none; }

        .tag {
            font-size: 12px; font-weight: 900; padding: 4px 10px;
            border-radius: 6px; background: white; border: 2px solid #000;
            color: var(--primary); white-space: nowrap;
            animation: pop 0.3s ease-out;
        }
        @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .main-content {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around; /* Distribuye el espacio entre logo, círculo y botones */
            overflow-y: auto;
        }

        .logo-box img { width: 140px; height: auto; }

        /* ÁREA DE PREDICCIÓN */
        .prediction-wrapper {
            position: relative;
            width: 200px; height: 200px;
            display: flex; justify-content: center; align-items: center;
        }

        #alert-money {
            position: absolute; width: 60px; top: -10px;
            display: none; z-index: 5;
            animation: pulse 0.5s infinite alternate;
        }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.15); } }

        .ring-svg { transform: rotate(-90deg); width: 200px; height: 200px; }
        .ring-bg { stroke: #f0f0f0; stroke-width: 12; fill: transparent; r: 85; cx: 100; cy: 100; }
        #ring-fill {
            stroke: var(--primary); stroke-width: 12; stroke-linecap: round;
            fill: transparent; r: 85; cx: 100; cy: 100;
            stroke-dasharray: 534; stroke-dashoffset: 534;
            transition: stroke-dashoffset 0.1s linear;
        }

        #payout-text { position: absolute; font-size: 42px; font-weight: 900; color: var(--primary); }

        /* CASINOS Y BOTÓN */
        .controls { width: 100%; }
        .grid {
            display: grid; grid-template-columns: repeat(5, 1fr);
            gap: 8px; margin: 15px 0;
        }
        .c-btn {
            aspect-ratio: 1/1; border: 2px solid #eee; border-radius: 12px;
            background: #DAB2FF; cursor: pointer; display: flex;
            align-items: center; justify-content: center; padding: 5px; transition: 0.2s;
        }
        .c-btn img { width: 100%; height: 100%; object-fit: contain; }
        .c-btn.active { border-color: #000; background: #b184f5; transform: scale(1.08); border-width: 3px; }

        .action-btn {
            width: 100%; padding: 18px; background: var(--primary);
            color: white; border: none; border-radius: 18px;
            font-size: 18px; font-weight: 900; text-transform: uppercase;
            box-shadow: 0 6px 0 #b30000; cursor: pointer; transition: 0.1s;
        }
        .action-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 #b30000; }
        .action-btn:disabled { background: #555; box-shadow: none; color: #999; cursor: not-allowed; }

        .footer {
            padding: 15px; text-align: center; background: #f9f9f9;
            border-top: 1px solid #eee; font-size: 12px; font-weight: 800;
            color: var(--primary); display: flex; justify-content: center; align-items: center; gap: 8px;
        }

        /* LOGIN COMPLETO */
        #login-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; padding: 20px;
        }
        .login-card {
            width: 100%; max-width: 360px; background: white;
            padding: 40px 25px; border-radius: 30px; text-align: center;
        }
        .login-input {
            width: 100%; padding: 15px; margin-bottom: 15px;
            border-radius: 12px; border: 2px solid #ddd; font-size: 16px;
        }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSFbiXr3I7b5I4H5zry3gOObdlyQkRdXeP9fg&s" style="width:120px; margin-bottom:20px;">
        <h2 style="color:var(--primary); margin-top:0;">LOGIN PREMIUM</h2>
        <input id="u" type="text" placeholder="Correo" class="login-input">
        <input id="p" type="password" placeholder="Password" class="login-input">
        <button onclick="checkLogin()" class="action-btn" style="box-shadow:none;">INGRESAR</button>
        <p id="error" style="color:red; font-size:12px; margin-top:10px;"></p>
    </div>
</div>

<div class="app-shell">
    <div class="header">PREDIC 1 WIN</div>
    <div class="history" id="h-bar"></div>

    <div class="main-content">
        <div class="logo-box">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSFbiXr3I7b5I4H5zry3gOObdlyQkRdXeP9fg&s">
        </div>

        <div id="msg" style="font-size:11px; font-weight:900; color:var(--primary); text-transform:uppercase;">¡ELIGE TU CASINO!</div>

        <div class="prediction-wrapper">
            <img id="alert-money" src="https://images.icon-icons.com/461/PNG/96/money_43847.png">
            <svg class="ring-svg" viewBox="0 0 200 200">
                <circle class="ring-bg"/>
                <circle id="ring-fill"/>
            </svg>
            <div id="payout-text">1.00x</div>
        </div>

        <div class="controls">
            <div style="font-size: 10px; font-weight: 800; text-align: center; color: #444;">VINCULAR SERVIDOR</div>
            <div class="grid">
                <div class="c-btn" onclick="setCasino(this)"><img src="https://image2url.com/r2/default/images/1772156226188-84436544-df13-4900-9c0a-4922454ac35a.jpg"></div>
                <div class="c-btn" onclick="setCasino(this)"><img src="https://image2url.com/r2/default/images/1772156718063-9d7f327c-3f38-4c54-a4af-8b6902096337.png"></div>
                <div class="c-btn" onclick="setCasino(this)"><img src="https://image2url.com/r2/default/images/1772156777400-140ec198-b410-4c90-963e-b6a7b3b8ffe5.png"></div>
                <div class="c-btn" onclick="setCasino(this)"><img src="https://image2url.com/r2/default/images/1772156881655-81bb1ea5-ffc0-4f39-9b03-e596eb0da86e.png"></div>
                <div class="c-btn" onclick="setCasino(this)"><img src="https://image2url.com/r2/default/images/1772156926302-a55f9d48-c419-40a3-bdbc-2a320d061d87.png"></div>
                <div class="c-btn" onclick="setCasino(this)"><img src="https://image2url.com/r2/default/images/1772157099303-685401df-2dba-48d6-ad22-89115f5dfb1b.png"></div>
                <div class="c-btn" onclick="setCasino(this)"><img src="https://image2url.com/r2/default/images/1772157139259-9ff0140d-73a3-4141-b928-661681cb29a0.png"></div>
                <div class="c-btn" onclick="setCasino(this)"><img src="https://image2url.com/r2/default/images/1772157235100-e2589491-3023-4dd7-a3bf-f05fef4c349d.png"></div>
                <div class="c-btn" onclick="setCasino(this)"><img src="https://image2url.com/r2/default/images/1772157291495-d6069e42-b827-4bc1-add5-4e7fb9a90656.jpg"></div>
                <div class="c-btn" onclick="setCasino(this)"><img src="https://image2url.com/r2/default/images/1772157380024-78169a5a-68bd-4a96-b234-d773ddd3cff5.png"></div>
            </div>
            <button id="go-btn" class="action-btn" onclick="start()" disabled>Siguiente Ronda</button>
        </div>
    </div>

    <div class="footer">
        <img src="https://images.icon-icons.com/2232/PNG/96/telegram_logo_icon_134592.png" style="width:16px;">
        PREDIC 1 WIN - PREMIUM
    </div>
</div>

<script>
    const CONFIG = { user: "predic1win@gmail.com", pass: "12345678" };
    // Las señales que me pediste mantener
    const SEÑALES = [1.93, 3.00, 2.00, 2.91, 1.51, 4.20, 1.85, 9.50];
    let signalPos = 0;

    function checkLogin() {
        if(document.getElementById('u').value === CONFIG.user && document.getElementById('p').value === CONFIG.pass) {
            document.getElementById('login-overlay').style.display = "none";
        } else {
            document.getElementById('error').innerText = "ERROR DE ACCESO";
        }
    }

    function setCasino(el) {
        document.querySelectorAll('.c-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('go-btn').disabled = false;
        document.getElementById('msg').innerText = "SISTEMA VINCULADO";
    }

    function start() {
        const btn = document.getElementById('go-btn');
        const text = document.getElementById('payout-text');
        const fill = document.getElementById('ring-fill');
        const alert = document.getElementById('alert-money');
        
        btn.disabled = true;
        alert.style.display = "none";
        fill.style.strokeDashoffset = 534;
        
        let countdown = 3;
        text.innerText = countdown;
        
        let timer = setInterval(() => {
            countdown--;
            if(countdown > 0) text.innerText = countdown;
            else {
                clearInterval(timer);
                runPrediction();
            }
        }, 1000);
    }

    function runPrediction() {
        const text = document.getElementById('payout-text');
        const fill = document.getElementById('ring-fill');
        const alert = document.getElementById('alert-money');
        const target = SEÑALES[signalPos];
        signalPos = (signalPos + 1) % SEÑALES.length;

        let current = 1.00;
        document.getElementById('msg').innerText = "PREDICCIÓN EN CURSO...";

        let anim = setInterval(() => {
            current += 0.01;
            text.innerText = current.toFixed(2) + "x";
            
            let p = (current - 1) / (target - 1);
            fill.style.strokeDashoffset = 534 - (p * 534);

            if(current >= target) {
                clearInterval(anim);
                text.innerText = target.toFixed(2) + "x";
                alert.style.display = "block";
                document.getElementById('msg').innerText = "¡PREDICCIÓN EXITOSA!";
                document.getElementById('go-btn').disabled = false;
                
                const log = document.createElement('div');
                log.className = 'tag';
                log.innerText = target.toFixed(2) + "x";
                document.getElementById('h-bar').prepend(log);
            }
        }, 40);
    }
</script>
</body>
</html>
