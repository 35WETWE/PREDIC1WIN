<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="author" content="William Robert">
    <title>PREDIC 1 WIN - PREMIUM V2.0</title>

    <style>
        :root {
            --primary: #E7180B;
            --primary-dark: #9e0d04;
            --bg-dark: #0a0a0a;
            --app-white: #ffffff;
            --tg-blue: #0088cc;
            --wa-green: #25D366;
        }

        /* RESET TOTAL - CERO SCROLL */
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg-dark);
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* BLOQUEO DE SCROLL TOTAL */
        }

        /* PANTALLA DE LOGUEO */
        #auth-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 25px;
        }

        .auth-card {
            background: white;
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 35px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
        }

        .auth-input {
            width: 100%;
            padding: 16px;
            margin-bottom: 15px;
            border-radius: 12px;
            border: 2px solid #eee;
            font-size: 16px;
        }

        /* CONTENEDOR PRINCIPAL AJUSTADO A LA PANTALLA */
        .main-wrapper {
            width: 100%;
            max-width: 480px;
            height: 100vh; /* Altura total del dispositivo */
            background: var(--app-white);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .premium-header {
            background: var(--primary);
            padding: 15px 0;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .premium-header h1 {
            color: white;
            font-size: 20px;
            font-weight: 900;
            letter-spacing: 3px;
        }

        .history-container {
            background: #000;
            padding: 10px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            min-height: 50px;
            align-items: center;
            border-bottom: 2px solid var(--primary);
        }
        .history-container::-webkit-scrollbar { display: none; }

        .signal-pill {
            background: white;
            color: var(--primary);
            font-size: 12px;
            font-weight: 900;
            padding: 4px 10px;
            border-radius: 8px;
            border: 1px solid var(--primary);
        }

        /* CONTENIDO DINÁMICO SIN SCROLL */
        .app-content {
            flex: 1; /* Ocupa todo el espacio sobrante */
            display: flex;
            flex-direction: column;
            justify-content: space-evenly; /* Distribuye los elementos equitativamente */
            align-items: center;
            padding: 10px 20px;
            overflow: hidden;
        }

        .brand-zone img {
            width: 120px;
            margin-bottom: 10px;
        }

        .admin-card {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 12px;
            width: 100%;
            border: 1px solid #eee;
            text-align: center;
        }

        .social-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 8px;
        }

        .social-link {
            text-decoration: none;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 800;
        }
        .social-link.tg { background: var(--tg-blue); }
        .social-link.wa { background: var(--wa-green); }

        /* EL ARO (AJUSTADO PARA QUE QUEPA TODO) */
        .engine-zone {
            position: relative;
            width: 180px;
            height: 180px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .ring-canvas {
            transform: rotate(-90deg);
            width: 180px;
            height: 180px;
        }

        .track-layer {
            stroke: #edf2f7;
            stroke-width: 12;
            fill: none;
            r: 75; cx: 90; cy: 90;
        }

        #progress-layer {
            stroke: var(--primary);
            stroke-width: 12;
            stroke-linecap: round;
            fill: none;
            r: 75; cx: 90; cy: 90;
            stroke-dasharray: 471; /* 2 * PI * 75 */
            stroke-dashoffset: 471;
            transition: stroke-dashoffset 0.1s linear;
        }

        .value-display {
            position: absolute;
            font-size: 42px;
            font-weight: 900;
            color: var(--primary);
        }

        /* CASINO GRID SIN FONDO BLANCO */
        .casino-selection { width: 100%; }
        .grid-header { font-size: 10px; font-weight: 900; text-align: center; margin-bottom: 8px; color: #888; }

        .casino-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        .casino-slot {
            aspect-ratio: 1;
            background: transparent; /* TRANSPARENTE COMO PEDISTE */
            border: 2px solid #f0f0f0;
            border-radius: 12px;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .casino-slot img { width: 100%; height: 100%; object-fit: contain; }
        .casino-slot.active {
            border-color: var(--primary);
            background: rgba(231,24,11,0.05);
            transform: scale(1.05);
        }

        .action-button {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 900;
            text-transform: uppercase;
            box-shadow: 0 6px 0 var(--primary-dark);
            cursor: pointer;
        }

        .action-button:active { transform: translateY(3px); box-shadow: 0 3px 0 var(--primary-dark); }
        .action-button:disabled { background: #ccc; box-shadow: none; }

        .system-footer {
            text-align: center;
            padding: 10px;
            font-size: 9px;
            font-weight: 800;
            color: #bbb;
            background: #fafafa;
        }
    </style>
</head>
<body>

<div id="auth-overlay">

</div>

<div class="main-wrapper">

    <div class="app-content">

            <div class="admin-card">
                <span style="font-size:10px; font-weight:900; color:#999;">ADMIN: @PREDIC1WIN</span>
                <div class="social-row">
                    <a href="https://t.me/PREDIC1WIN" class="social-link tg">TELEGRAM</a>

        <div class="engine-zone">
            <svg class="ring-canvas">
                <circle class="track-layer"/>
                <circle id="progress-layer"/>
            </svg>

        <div class="casino-selection">

<script>
    const ADMIN_USER = "predic1win@gmail.com";
    const ADMIN_PASS = "12345678";
    const SIGNALS = [1.93, 3.00, 2.00, 2.91, 1.51];
    let step = 0;

    function validateAccess() {
        if(document.getElementById('u_mail').value === ADMIN_USER && document.getElementById('u_pass').value === ADMIN_PASS) {
            document.getElementById('auth-overlay').style.display = 'none';
        } else {
            document.getElementById('auth-err').innerText = "DATOS INCORRECTOS";
        }
    }

    function syncCasino(el) {
        document.querySelectorAll('.casino-slot').forEach(s => s.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('predictBtn').disabled = false;
    }

    function executeAlgorithm() {
        const btn = document.getElementById('predictBtn');
        const display = document.getElementById('multiplier');
        const ring = document.getElementById('progress-layer');
        const history = document.getElementById('historyLog');

        btn.disabled = true;
        let target = SIGNALS[step];
        step = (step + 1) % SIGNALS.length;
        
        let val = 1.00;
        let timer = setInterval(() => {
            val += 0.01;
            display.innerText = val.toFixed(2) + "x";
            let offset = 471 - (((val - 1) / (target - 1)) * 471);
            ring.style.strokeDashoffset = offset;

            if(val >= target) {
                clearInterval(timer);
                display.innerText = target.toFixed(2) + "x";
                btn.disabled = false;
                const p = document.createElement('div');
                p.className = 'signal-pill';
                p.innerText = target.toFixed(2) + "x";
                history.prepend(p);
            }
        }, 30);
    }
</script>
