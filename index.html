<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aviator Predictor</title>
    <style>
        * { box-sizing: border-box; }
        :root { --primary: #000; }
        body { margin: 0; padding: 0; font-family: sans-serif; display: flex; justify-content: center; min-height: 100vh; background-image: url('https://th.bing.com/th/id/OIP.DpeXCzBmCwnk0f6CJmGUFwHaNK?w=184&h=328&c=7&r=0&o=7&pid=1.7&rm=3'); background-size: cover; background-position: center; }
        .main-container { width: 100%; max-width: 470px; min-height: 100vh; background: rgba(0,0,0,0.5); display: none; flex-direction: column; }
        .app-header { background: var(--primary); padding: 15px; color: white; text-align: center; font-weight: bold; }
        .content { flex: 1; padding: 15px; display: flex; flex-direction: column; align-items: center; gap: 15px; width: 100%; }
        
        .casino-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; width: 100%; max-width: 400px; margin: 0 auto; }
        .casino-btn { aspect-ratio: 1 / 1; border: 2px solid #fff; border-radius: 8px; cursor: pointer; background: #fff; padding: 5px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .casino-btn.selected { border-color: #ff007f; transform: scale(1.05); }
        .casino-btn img { width: 100%; height: 100%; object-fit: contain; }

        .next-btn { background: #fff; color: red; border: none; padding: 15px; width: 100%; max-width: 400px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .next-btn:disabled { background: #555; color: #ccc; }

        #analysis-box { width: 100%; max-width: 400px; text-align: center; }
        #analysis-gif { width: 100%; height: auto; max-height: 180px; border-radius: 10px; border: 2px solid #333; }
        #analysis-log { width: 100%; background: #fff; color: red; padding: 10px; border-radius: 10px; font-weight: bold; margin-top: 5px; }

        .contact-row { display: flex; gap: 10px; width: 100%; max-width: 400px; }
        .contact-btn { flex: 1; padding: 10px; border-radius: 10px; background: #fff; color: red; text-decoration: none; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 14px; }
        .contact-btn img { width: 20px; height: 20px; }
        
        #login-screen { position: fixed; inset: 0; background: #000; display: flex; justify-content: center; align-items: center; z-index: 9999; padding: 20px; }
        .login-box { width: 100%; max-width: 350px; background: pink; padding: 25px; border-radius: 20px; text-align: center; }
        .login-input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 2px solid #000; }
        .social-btn { width: 50px; height: 50px; border: 1px solid #ccc; border-radius: 10px; cursor: pointer; margin: 5px; background: #fff; display: flex; align-items: center; justify-content: center; }

        .color-azul { color: #00bfff; }
        .color-morado { color: #bc13fe; }
        .color-rosa { color: #ff007f; }
        #result-display { font-size: 50px; font-weight: 900; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <img src="https://media.tenor.com/wFUdrz9-f84AAAAM/uuaviatorpka-aviatorpkauu.gif" style="width: 100%; height: auto; margin-bottom: 10px; border-radius: 10px; display: block;">
        <h2 style="color:#000; margin-top: 0;">INICIAR SESIÓN</h2>
        <input type="text" id="user" class="login-input" placeholder="Usuario">
        <input type="password" id="pass" class="login-input" placeholder="Contraseña">
        <button onclick="login()" class="next-btn" style="background:#000; color:#fff;">INGRESAR</button>
        <div style="margin-top: 20px; display: flex; justify-content: center;">
            <button class="social-btn" id="btn-google"><img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="24"></button>
            <button class="social-btn" id="btn-apple" style="background:#000;"><img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" width="20" style="filter:invert(1);"></button>
            <button class="social-btn" id="btn-phone"><img src="https://cdn-icons-png.flaticon.com/512/724/724664.png" width="24"></button>
        </div>
        <p id="login-msg" style="color:red;"></p>
    </div>
</div>

<div class="main-container" id="app">
    <div class="app-header">AVIATOR PREDICTOR</div>
    <div class="content">
        <div id="result-display" class="color-azul">1.00x</div>
        
        <div class="casino-grid" id="grid">
            <div class="casino-btn" onclick="selCas(this)"><img src="https://image2url.com/r2/default/images/1772156226188-84436544-df13-4900-9c0a-4922454ac35a.jpg"></div>
            <div class="casino-btn" onclick="selCas(this)"><img src="https://image2url.com/r2/default/images/1772156718063-9d7f327c-3f38-4c54-a4af-8b6902096337.png"></div>
            <div class="casino-btn" onclick="selCas(this)"><img src="https://image2url.com/r2/default/images/1772156777400-140ec198-b410-4c90-963e-b6a7b3b8ffe5.png"></div>
            <div class="casino-btn" onclick="selCas(this)"><img src="https://image2url.com/r2/default/images/1772156881655-81bb1ea5-ffc0-4f39-9b03-e596eb0da86e.png"></div>
            <div class="casino-btn" onclick="selCas(this)"><img src="https://image2url.com/r2/default/images/1772156926302-a55f9d48-c419-40a3-bdbc-2a320d061d87.png"></div>
            <div class="casino-btn" onclick="selCas(this)"><img src="https://image2url.com/r2/default/images/1772157099303-685401df-2dba-48d6-ad22-89115f5dfb1b.png"></div>
            <div class="casino-btn" onclick="selCas(this)"><img src="https://image2url.com/r2/default/images/1772738281198-f4289bac-a801-45ef-aa4a-c118d4141b1e.jpg"></div>
            <div class="casino-btn" onclick="selCas(this)"><img src="https://image2url.com/r2/default/images/1772738642227-ffa57d40-8d47-4331-a396-e4c8afa35a3b.png"></div>
            <div class="casino-btn" onclick="selCas(this)"><img src="https://image2url.com/r2/default/images/1772157291495-d6069e42-b827-4bc1-add5-4e7fb9a90656.jpg"></div>
            <div class="casino-btn" onclick="selCas(this)"><img src="https://image2url.com/r2/default/images/1772157380024-78169a5a-68bd-4a96-b234-d773ddd3cff5.png"></div>
        </div>
        
        <button class="next-btn" id="btn" onclick="runSequence()" disabled>Siguiente Ronda</button>
        
        <div id="analysis-box">
            <img id="analysis-gif" src="https://media.tenor.com/N02aeghYzkoAAAAM/entrada-confirmada.gif">
            <div id="analysis-log">Predictor</div>
        </div>

        <div class="contact-row">
            <a href="#" class="contact-btn"><img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg"> TELEGRAM</a>
            <a href="#" class="contact-btn"><img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg"> WHATSAPP</a>
        </div>
    </div>
</div>

<script>
    const misSenales = [1.50, 2.20, 5.00, 1.10, 3.50, 8.00, 15.00, 1.25, 4.00, 2.50];
    let roundCounter = 0;

    function login() {
        if(document.getElementById("user").value === "AVIATORPKA" && document.getElementById("pass").value === "AVIATORPKA") {
            document.getElementById("login-screen").style.display = "none";
            document.getElementById("app").style.display = "flex";
        } else { document.getElementById("login-msg").innerText = "Credenciales incorrectas"; }
    }

    function selCas(el) {
        document.querySelectorAll('.casino-btn').forEach(b => b.classList.remove('selected'));
        el.classList.add('selected');
        document.getElementById('btn').disabled = false;
    }

    function runSequence() {
        document.getElementById('btn').disabled = true;
        let log = document.getElementById('analysis-log');
        let target = misSenales[roundCounter % misSenales.length];
        let val = 1.00;
        let d = document.getElementById('result-display');
        
        let loop = setInterval(() => {
            val += 0.05; 
            d.innerText = val.toFixed(2) + "x";
            d.className = val < 2.00 ? 'color-azul' : (val < 10.00 ? 'color-morado' : 'color-rosa');
            
            if (val < target) log.innerText = "Analizando: " + val.toFixed(2) + "x...";
            if(val >= target) { 
                d.innerText = target.toFixed(2) + "x";
                log.innerText = target.toFixed(2) + "x se fue";
                clearInterval(loop); 
                document.getElementById('btn').disabled = false; 
                roundCounter++;
            }
        }, 150);
    }

    document.addEventListener('contextmenu', event => event.preventDefault());
    document.addEventListener('keydown', e => {
        if(e.key === 'F12' || (e.ctrlKey && ['u','s','p','i','j','c'].includes(e.key.toLowerCase()))) e.preventDefault();
    });
</script>
</body>
</html>
