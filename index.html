            --app-white: #ffffff;
            --tg-blue: #0088cc;
            --wa-green: #25D366;
            --gray-sub: #888888;
            --border-ui: #f0f0f0;
            --transition-main: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        /* FRAMEWORK RESET - OPTIMIZADO PARA NO SCROLL */
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: WHITE; 
            margin: 0;
            padding: 0;
            user-select: none;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden; /* BLOQUEO DE SCROLL ABSOLUTO */
            background: var(--bg-dark);
        }

        body {

            justify-content: center;
            align-items: center;
        }

        /* ANIMACIONES DE SISTEMA */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes pulseGlow { 0% { box-shadow: 0 0 5px var(--primary-glow); } 50% { box-shadow: 0 0 20px var(--primary-glow); } 100% { box-shadow: 0 0 5px var(--primary-glow); } }
        @keyframes floatEffect { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

        /* PANTALLA DE ACCESO (GATEKEEPER) */
        #auth-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 25px;
            transition: opacity 0.6s ease-in-out;
        }

        .auth-card {
            background: var(--app-white);
            width: 100%;
            max-width: 400px;
            padding: 50px 35px;
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            animation: slideUp 0.6s ease-out;
        }

        .auth-card img {
            width: 110px;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1));
            margin-bottom: 20px;
        }

        .auth-card h2 {
            color: var(--primary);
            font-weight: 900;
            font-size: 24px;
            letter-spacing: 1px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .auth-input {
            width: 100%;
            padding: 18px;
            margin-bottom: 15px;
            border-radius: 15px;
            border: 2px solid var(--border-ui);
            font-size: 16px;
            font-weight: 600;
            transition: var(--transition-main);
            color: #333;
        }

        .auth-input:focus {
            border-color: var(--primary);
            background: #fffcfc;
            outline: none;
        }

        /* CONTENEDOR DE APP ESTRUCTURADO */
        .main-wrapper {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            background: var(--app-white);
            display: flex;
            flex-direction: column;
            position: relative;

            font-size: 22px;

        /* HISTORIAL DE SEÑALES */

        .signal-pill {

            font-weight: 900;
            padding: 5px 12px;
            border-radius: 10px;
            border: 2px solid var(--primary);

            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;

            gap: 12px;
        }

        .social-btn {
            text-decoration: none;
            color: white;
            padding: 10px 18px;
            border-radius: 25px;
            font-size: 12px;
            font-weight: 800;

        .social-btn:active { transform: scale(0.9); }

        .social-btn.wa { background: var(--wa-green); }

        /* MOTOR DE PREDICCIÓN (ARO MAESTRO) */
        .engine-zone {
            position: relative;
            width: 200px;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .ring-canvas {
            transform: rotate(-90deg);
            width: 200px;
            height: 200px;
        }

        .track-layer {
            stroke: #edf2f7;
            stroke-width: 14;
            fill: none;
            r: 85; cx: 100; cy: 100;
        }

        #progress-layer {
            stroke: var(--primary);
            stroke-width: 14;
            stroke-linecap: round;
            fill: none;
            r: 85; cx: 100; cy: 100;
            stroke-dasharray: 534; /* 2 * PI * 85 */
            stroke-dashoffset: 534;
            transition: stroke-dashoffset 0.1s linear;
        }

        .value-display {
            position: absolute;
            font-size: 48px;
            font-weight: 900;
            color: var(--primary);
            text-shadow: 0 4px 10px rgba(231,24,11,0.2);
        }

        #money-success {
            position: absolute;
            width: 65px;
            top: -25px;
            display: none;
            z-index: 5;

        /* GRID DE CASINOS (TRANSPARENTE) */
        .casino-selection { width: 100%; }

            font-weight: 900;
            text-align: center;

            color: var(--gray-sub);
            letter-spacing: 2px;
        }

        .casino-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;

        }

        .casino-slot {

        /* BOTÓN DE ACCIÓN */

            font-size: 10px;
            font-weight: 800;
            color: #cccccc;
            letter-spacing: 1px;
        }

    </style>

    // MOTOR DE CALCULO DE SEÑALES
    function startPrediction() {
        const btn = document.getElementById('runAlgorithm');
        const text = document.getElementById('multiplier-text');
        const ring = document.getElementById('progress-layer');
        const history = document.getElementById('historyBox');
        const money = document.getElementById('money-success');

        // Reset Interno
        btn.disabled = true;
        money.style.display = 'none';
        ring.style.strokeDashoffset = CIRCUMFERENCE;

        let target = SIGNALS_DB[pointer];
        pointer = (pointer + 1) % SIGNALS_DB.length;

        console.log("Analizando patrones de vuelo... Señal objetivo: " + target);

        let currentVal = 1.00;
        let speed = 35; // Balance profesional entre velocidad y realismo

        let interval = setInterval(() => {
            currentVal += 0.01;
            text.innerText = currentVal.toFixed(2) + "x";

            // Animación del aro de progreso
            let progress = (currentVal - 1) / (target - 1);
            ring.style.strokeDashoffset = CIRCUMFERENCE - (progress * CIRCUMFERENCE);

            if(currentVal >= target) {
                clearInterval(interval);
                text.innerText = target.toFixed(2) + "x";
                money.style.display = 'block';
                btn.disabled = false;

                console.log("Señal generada con éxito.");

                // Registro en historial visual
                const pill = document.createElement('div');
                pill.className = 'signal-pill';
                pill.innerText = target.toFixed(2) + "x";
                history.prepend(pill);
            }
        }, speed);
