            height: 100px;
            animation: spin 1.5s linear infinite;

            color: white;
            margin-top: 20px;
            font-weight: 740;
            letter-spacing: 2px;
            text-transform: uppercase;

        .main-container {
            width: 100%;
            max-width: 470px;
            height: 100vh;
            background: var(--app-bg);

            overflow: hidden;
            display: none;

            box-shadow: 0 0 20px rgba(0,0,0,0.5);

        .app-header {
            background: var(--primary);
            padding: 10px 10px;
            font-size: 10px;
            font-weight: 740;
            text-align: center;
            color: white;
            letter-spacing: 1.2px;
            text-transform: uppercase;
        }

        .history-bar {
            background: #000;
            padding: 8px;
            display: flex;
            gap: 5px;
            overflow-x: auto;
            min-height: 40px;
            border-bottom: 1px solid #000;
            align-items: center;
        }
        .history-bar::-webkit-scrollbar { display: none; }

        .payout-tag {
            font-size: 11px;
            font-weight: 740;
            padding: 3px 8px;
            border-radius: 6px;
            background: white;
            border: 2px solid #000;
            color: var(--primary);
            white-space: nowrap;
            animation: slideIn 1.0s ease-out;
        }
        @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .content {
            flex: 1;
            padding: 15px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            overflow-y: auto;

            font-weight: 740;
            text-transform: uppercase;
            margin: 5px 0;
            text-align: center;

        .prediction-area {

            width: 140px;
            height: 140px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 10px 0;

            width: 50px;
            top: -15px;
            display: none;
            z-index: 50;

            animation: warningPulse 0.5s infinite alternate;

        #prog-bar {
            stroke: var(--primary);
            stroke-width: 10;
            stroke-linecap: round;
            fill: transparent;
            r: 70; cx: 80; cy: 80;
            stroke-dasharray: 440;
            stroke-dashoffset: 440;

            font-size: 34px;
            font-weight: 740;
            color: var(--primary);
