<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ＰＲＥＤＩＣＴＯＲ ⚡️</title>
    <style>
        :root {
            --primary: #E7180B;
            --bg-body: #1a1a1a;
            --app-bg: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-body);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .main-container {
            width: 100%;
            max-width: 470px;
            height: 100vh;
            background: var(--app-bg);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .app-header {
            background: var(--primary);
            padding: 10px;
            font-size: 12px;
            font-weight: 800;
            text-align: center;
            color: white;
            text-transform: uppercase;
        }

        .history-bar {
            background: #000;
            padding: 8px;
            display: flex;
            gap: 5px;
            overflow-x: auto;
            min-height: 45px;
            align-items: center;
        }
        .history-bar::-webkit-scrollbar { display: none; }

        .payout-tag {
            font-size: 11px;
            font-weight: 740;
            padding: 3px 8px;
            border-radius: 6px;
            background: white;
            border: 2px solid #000;
            color: var(--primary);
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .content {
            flex: 1;
            padding: 15px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
        }

        .logo-box img { width: 110px; height: auto; }

        .status-msg {
            font-size: 11px;
            color: var(--primary);
            font-weight: 800;
            text-transform: uppercase;
        }

        .prediction-area {
            position: relative;
            width: 160px;
            height: 160px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #alert-icon {
            position: absolute;
            width: 45px;
            top: -10px;
            display: none;
            z-index: 50;
            animation: warningPulse 0.3s infinite alternate;
        }
        @keyframes warningPulse { from { transform: scale(1); } to { transform: scale(1.2); } }

        .progress-ring { transform: rotate(-90deg); width: 160px; height: 160px; }
        .progress-ring__bg { stroke: #f0f0f0; stroke-width: 10; fill: transparent; r: 70; cx: 80; cy: 80; }
        #prog-bar {
            stroke: var(--primary);
            stroke-width: 10;
            stroke-linecap: round;
            fill: transparent;
            r: 70; cx: 80; cy: 80;
            stroke-dasharray: 440;
            stroke-dashoffset: 440;
            transition: stroke-dashoffset 0.05s linear;
        }

        #result-display {
            position: absolute;
            font-size: 34px;
            font-weight: 800;
            color: var(--primary);
        }

        .casino-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            margin: 10px 0;
        }

        .casino-btn {
            aspect-ratio: 1;
            border: 2px solid #eee;
            border-radius: 8px;
            cursor: pointer;
            background: #DAB2FF;
            transition: 0.2s;
            padding: 4px;
        }
        .casino-btn img { width: 100%; height: 100%; object-fit: contain; }
        .casino-btn.selected { border-color: #000; background: #b184f5; transform: scale(1.1); }

        .next-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            width: 100%;
            font-size: 16px;
            font-weight: 800;
            border-radius: 12px;
            box-shadow: 0 4px 0 #b30000;
            text-transform: uppercase;
        }
        .next-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #b30000; }
        .next-btn:disabled { background: #999; box-shadow: none; opacity: 0.6; }

        #login-screen {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .login-box {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 320px;
            text-align: center;
        }
        .login-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 2px solid var(--primary);
            border-radius: 8px;
        }
    </style>
</head>
<body>

<audio id="win-sound" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3" preload="auto"></audio>

<div id="login-screen">
    <div class="login-box">
        <h2 style="color:var(--primary)">ＰＲＥＤＩＣＴＯＲ</h2>
        <input id="user" type="text" placeholder="Usuario" class="login-input">
        <input id="pass" type="password" placeholder="Contraseña" class="login-input">
        <button onclick="login()" class="next-btn" style="padding:10px;">ACCEDER</button>
        <p id="login-msg" style="color:red; font-size:12px;"></p>
    </div>
</div>

<div class="main-container">
    <div class="app-header">ＡＶＩＡＴＯＲ ＰＲＥＤＩＣＴＯＲ</div>
    <div class="history-bar" id="historyBar"></div>

    <div class="content">
        <div class="logo-box">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSFbiXr3I7b5I4H5zry3gOObdlyQkRdXeP9fg&s">
        </div>

        <div class="status-msg" id="status">LISTO PARA ESCANEAR</div>

        <div class="prediction-area">
            <img id="alert-icon" src="https://images.icon-icons.com/461/PNG/96/money_43847.png">
            <svg class="progress-ring" viewBox="0 0 160 160">
                <circle class="progress-ring__bg"/>
                <circle id="prog-bar"/>
            </svg>
            <div id="result-display">1.00x</div>
        </div>

        <div style="width: 100%;">
            <div class="casino-grid">
                <div class="casino-btn" onclick="selCas(this)"><img src="https://image2url.com/r2/default/images/1772156226188-84436544-df13-4900-9c0a-4922454ac35a.jpg"></div>
                <div class="casino-btn" onclick="selCas(this)"><img src="https://image2url.com/r2/default/images/1772156718063-9d7f327c-3f38-4c54-a4af-8b6902096337.png"></div>
                <div class="casino-btn" onclick="selCas(this)"><img src="https://image2url.com/r2/default/images/1772156777400-140ec198-b410-4c90-963e-b6a7b3b8ffe5.png"></div>
                <div class="casino-btn" onclick="selCas(this)"><img src="https://image2url.com/r2/default/images/1772156881655-81bb1ea5-ffc0-4f39-9b03-e596eb0da86e.png"></div>
                <div class="casino-btn" onclick="selCas(this)"><img src="https://image2url.com/r2/default/images/1772156926302-a55f9d48-c419-40a3-bdbc-2a320d061d87.png"></div>
                <div class="casino-btn" onclick="selCas(this)"><img src="https://image2url.com/r2/default/images/1772157099303-685401df-2dba-48d6-ad22-89115f5dfb1b.png"></div>
                <div class="casino-btn" onclick="selCas(this)"><img src="https://image2url.com/r2/default/images/1772738281198-f4289bac-a801-45ef-aa4a-c118d4141b1e.jpg"></div>
                <div class="casino-btn" onclick="selCas(this)"><img src="https://image2url.com/r2/default/images/1772738642227-ffa57d40-8d47-4331-a396-e4c8afa35a3b.png"></div>
                <div class="casino-btn" onclick="selCas(this)"><img src="https://image2url.com/r2/default/images/1772157291495-d6069e42-b827-4bc1-add5-4e7fb9a90656.jpg"></div>
                <div class="casino-btn" onclick="selCas(this)"><img src="https://image2url.com/r2/default/images/1772157380024-78169a5a-68bd-4a96-b234-d773ddd3cff5.png"></div>
            </div>
            <button class="next-btn" id="btn" onclick="runSequence()" disabled>OBTENER SEÑAL</button>
        </div>
    </div>
</div>

<script>
    const USER_CORRECTO = "12345678";
    const PASS_CORRECTA = "283212345678";
    const misSeñales = [2.45, 1.80, 4.12, 1.33, 7.50, 1.95, 3.10, 5.20];
    let step = 0;

    function login(){
        if(document.getElementById("user").value === USER_CORRECTO && 
           document.getElementById("pass").value === PASS_CORRECTA){
            document.getElementById("login-screen").style.display = "none";
        } else {
            document.getElementById("login-msg").innerText = "Datos incorrectos";
        }
    }

    function selCas(el) {
        document.querySelectorAll('.casino-btn').forEach(b => b.classList.remove('selected'));
        el.classList.add('selected');
        document.getElementById('btn').disabled = false;
        document.getElementById('status').innerText = "CASINO VINCULADO";
    }

    function runSequence() {
        const display = document.getElementById('result-display');
        const btn = document.getElementById('btn');
        const status = document.getElementById('status');
        const progBar = document.getElementById('prog-bar');
        
        btn.disabled = true;
        document.getElementById('alert-icon').style.display = "none";
        progBar.style.strokeDashoffset = 440;
        
        // Conteo rápido (0.2s por número)
        let count = 3;
        status.innerText = "ESCANEO...";
        
        let timer = setInterval(() => {
            display.innerText = count;
            if (count <= 1) {
                clearInterval(timer);
                startAnalysis();
            }
            count--;
        }, 200); 
    }

    function startAnalysis() {
        const display = document.getElementById('result-display');
        const status = document.getElementById('status');
        const alertImg = document.getElementById('alert-icon');
        const history = document.getElementById('historyBar');
        const btn = document.getElementById('btn');
        const progBar = document.getElementById('prog-bar');
        const winAudio = document.getElementById('win-sound');

        const target = misSeñales[step];
        step = (step + 1) % misSeñales.length;

        let val = 1.00;
        status.innerText = "GENERANDO...";

        let loop = setInterval(() => {
            val += 0.15; // Incremento más rápido
            display.innerText = val.toFixed(2) + "x";

            let p = (val - 1) / (target - 1);
            if(p > 1) p = 1;
            progBar.style.strokeDashoffset = 440 - (p * 440); 

            if (val >= target) {
                clearInterval(loop);
                display.innerText = target.toFixed(2) + "x";
                status.innerText = "¡SEÑAL LISTA!";
                alertImg.style.display = "block";
                btn.disabled = false;

                winAudio.play().catch(() => {});

                const log = document.createElement('div');
                log.className = 'payout-tag';
                log.innerText = target.toFixed(2) + "x";
                history.prepend(log);
            }
        }, 15); // Bucle ultrarrápido (15ms)
    }
</script>
</body>
</html>
