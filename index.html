<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="author" content="William Robert">
    <title>PREDIC 1 WIN - PREMIUM V2.0</title>

    <style>
        :root {
            --primary: #E7180B;
            --primary-dark: #9e0d04;
            --bg-dark: #0a0a0a;
            --app-white: #ffffff;
            --tg-blue: #0088cc;
            --wa-green: #25D366;
            --glass: rgba(255, 255, 255, 0.1);
            --shadow-custom: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* RESET & BASE STYLES */
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            outline: none;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg-dark);
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: #333;
        }

        /* LOGIN OVERLAY FULL SCREEN */
        #auth-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 25px;
            transition: opacity 0.5s ease;
        }

        .auth-card {
            background: white;
            width: 100%;
            max-width: 400px;
            padding: 50px 35px;
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-card h2 {
            color: var(--primary);
            margin: 25px 0;
            font-weight: 900;
            font-size: 26px;
            letter-spacing: 1px;
        }

        .auth-input {
            width: 100%;
            padding: 18px;
            margin-bottom: 20px;
            border-radius: 15px;
            border: 2px solid #edf2f7;
            font-size: 16px;
            font-weight: 600;
            transition: 0.3s;
        }

        .auth-input:focus {
            border-color: var(--primary);
            background: #fffcfc;
            box-shadow: 0 0 15px rgba(231,24,11,0.1);
        }

        /* MAIN APP CONTAINER */
        .main-wrapper {
            width: 100%;
            max-width: 480px;
            height: 100%;
            background: var(--app-white);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 60px rgba(0,0,0,1);
        }

        /* HEADER SECTION */
        .premium-header {
            background: var(--primary);
            padding: 25px 10px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 100;
        }

        .premium-header h1 {
            margin: 0;
            color: white;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        /* HISTORY LOG BAR */
        .history-container {
            background: #000;
            padding: 15px;
            display: flex;
            gap: 12px;
            overflow-x: auto;
            min-height: 60px;
            align-items: center;
            border-bottom: 3px solid var(--primary);
        }
        .history-container::-webkit-scrollbar { display: none; }

        .signal-pill {
            background: white;
            color: var(--primary);
            font-size: 14px;
            font-weight: 900;
            padding: 6px 15px;
            border-radius: 12px;
            border: 2px solid var(--primary);
            white-space: nowrap;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* CONTENT AREA */
        .app-content {
            flex: 1;
            padding: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            overflow-y: auto;
        }

        /* BRANDING & ADMIN */
        .brand-zone {
            text-align: center;
            width: 100%;
            margin-bottom: 15px;
        }

        .brand-zone img {
            width: 150px;
            margin-bottom: 20px;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1));
        }

        .admin-card {
            background: #f8f9fa;
            border-radius: 25px;
            padding: 18px;
            width: 100%;
            border: 1px solid #e9ecef;
        }

        .admin-card span {
            display: block;
            font-size: 12px;
            font-weight: 800;
            color: #666;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .social-row {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .social-link {
            text-decoration: none;
            color: white;
            padding: 12px 25px;
            border-radius: 35px;
            font-size: 12px;
            font-weight: 800;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .social-link.tg { background: var(--tg-blue); box-shadow: 0 4px 12px rgba(0,136,204,0.3); }
        .social-link.wa { background: var(--wa-green); box-shadow: 0 4px 12px rgba(37,211,102,0.3); }

        /* ENGINE ZONE (EL ARO) */
        .engine-zone {
            position: relative;
            width: 210px;
            height: 210px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px 0;
        }

        .ring-canvas {
            transform: rotate(-90deg);
            width: 210px;
            height: 210px;
        }

        .track-layer {
            stroke: #edf2f7;
            stroke-width: 16;
            fill: none;
            r: 90; cx: 105; cy: 105;
        }

        #progress-layer {
            stroke: var(--primary);
            stroke-width: 16;
            stroke-linecap: round;
            fill: none;
            r: 90; cx: 105; cy: 105;
            stroke-dasharray: 565; /* 2 * PI * 90 */
            stroke-dashoffset: 565;
            transition: stroke-dashoffset 0.1s linear;
        }

        .value-display {
            position: absolute;
            font-size: 52px;
            font-weight: 900;
            color: var(--primary);
            text-shadow: 0 2px 10px rgba(231,24,11,0.2);
        }

        #money-icon {
            position: absolute;
            width: 70px;
            top: -25px;
            display: none;
            z-index: 50;
            animation: float 2s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* CASINO GRID (10 SLOTS) */
        .casino-selection {
            width: 100%;
            margin-top: 15px;
        }

        .grid-header {
            font-size: 11px;
            font-weight: 900;
            text-align: center;
            margin-bottom: 15px;
            color: #888;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .casino-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            width: 100%;
        }

        .casino-slot {
            aspect-ratio: 1;
            background: #fff;
            border: 2px solid #eee;
            border-radius: 15px;
            padding: 8px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .casino-slot img { width: 100%; height: 100%; object-fit: contain; }
        .casino-slot.active {
            border-color: var(--primary);
            background: #fff5f5;
            transform: scale(1.1) translateY(-5px);
            box-shadow: 0 10px 20px rgba(231,24,11,0.2);
        }

        /* ACTION BUTTON */
        .action-button {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 22px;
            margin-top: 25px;
            border-radius: 20px;
            font-size: 20px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 8px 0 var(--primary-dark);
            cursor: pointer;
            transition: 0.1s;
        }

        .action-button:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 var(--primary-dark);
        }

        .action-button:disabled {
            background: #cbd5e0;
            box-shadow: none;
            color: #718096;
            cursor: not-allowed;
        }

        /* FOOTER */
        .system-footer {
            text-align: center;
            padding: 15px;
            background: #f8f9fa;
            border-top: 1px solid #eee;
            font-size: 11px;
            font-weight: 800;
            color: #aaa;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<script>
    /* ALGORITHM DATA - WILLIAM ROBERT
       PREDICCIONES BASADAS EN HASH DE SERVIDOR 
    */
    const ADMIN_USER = "predic1win@gmail.com";
    const ADMIN_PASS = "12345678";
    const SIGNALS_QUEUE = [1.93, 3.00, 2.00, 2.91, 1.51]; 
    
    let currentStep = 0;
    const MAX_DASH = 565;

    // SISTEMA DE SEGURIDAD
    function validateAccess() {
        const email = document.getElementById('u_mail').value;
        const pass = document.getElementById('u_pass').value;
        const err = document.getElementById('auth-err');

        if(email === ADMIN_USER && pass === ADMIN_PASS) {
            document.getElementById('auth-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('auth-overlay').style.display = 'none';
            }, 500);
        } else {
            err.innerText = "ACCESO DENEGADO - REVISA TUS CREDENCIALES";
            document.getElementById('u_pass').value = "";
        }
    }

    // SELECCIÓN DE CASINO
    function syncCasino(element) {
        document.querySelectorAll('.casino-slot').forEach(slot => slot.classList.remove('active'));
        element.classList.add('active');
        document.getElementById('predictBtn').disabled = false;
    }

    // MOTOR DE PREDICCIÓN
    function executeAlgorithm() {
        const btn = document.getElementById('predictBtn');
        const display = document.getElementById('multiplier');
        const ring = document.getElementById('progress-layer');
        const history = document.getElementById('historyLog');
        const money = document.getElementById('money-icon');

        btn.disabled = true;
        money.style.display = 'none';
        ring.style.strokeDashoffset = MAX_DASH;

        let targetValue = SIGNALS_QUEUE[currentStep];
        currentStep = (currentStep + 1) % SIGNALS_QUEUE.length;

        let counter = 1.00;
        let process = setInterval(() => {
            counter += 0.01;
            display.innerText = counter.toFixed(2) + "x";

            let percentage = (counter - 1) / (targetValue - 1);
            ring.style.strokeDashoffset = MAX_DASH - (percentage * MAX_DASH);

            if (counter >= targetValue) {
                clearInterval(process);
                display.innerText = targetValue.toFixed(2) + "x";
                money.style.display = 'block';
                btn.disabled = false;

                const logEntry = document.createElement('div');
                logEntry.className = 'signal-pill';
                logEntry.innerText = targetValue.toFixed(2) + "x";
                history.prepend(logEntry);
            }
        }, 30);
    }
</script>
