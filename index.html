<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aviator Predictor</title>
    <style>
        :root { --primary: #000; }
        body { margin: 0; padding: 0; font-family: sans-serif; display: flex; justify-content: center; min-height: 100vh; background-image: url('https://th.bing.com/th/id/OIP.DpeXCzBmCwnk0f6CJmGUFwHaNK?w=184&h=328&c=7&r=0&o=7&pid=1.7&rm=3'); background-size: cover; background-position: center; background-attachment: fixed; }
        .main-container { width: 100%; max-width: 470px; height: 100vh; background: transparent; display: none; flex-direction: column; }
        .app-header { background: var(--primary); padding: 15px; color: white; text-align: center; font-weight: 740; text-transform: uppercase; letter-spacing: 1.2px; }
        .content { flex: 1; padding: 15px; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 10px rgba(0,0,0,0.8); }
            50% { box-shadow: 0 0 20px rgba(0,0,0,1); }
            100% { box-shadow: 0 0 10px rgba(0,0,0,0.8); }
        }

        .result-container {
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 25px;
            border-radius: 15px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            animation: pulse 2s infinite;
            margin: 20px 0;
        }

        #result-display { font-size: 50px; font-weight: 900; text-shadow: 2px 2px 4px #000; transition: color 0.3s ease; }
        .color-azul { color: #00bfff; }
        .color-morado { color: #bf00ff; }
        .color-rosa { color: #ff007f; }
        
        .casino-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; width: 100%; }
        .casino-btn { aspect-ratio: 1 / 1; border: 2px solid #fffff; border-radius: 5px; cursor: pointer; background: #fff; padding: 2px; display: flex; align-items: center; justify-content: center; }
        .casino-btn.selected { border-color: #ff007f; transform: scale(1.1); box-shadow: 0 0 8px #ff007f; }
        .casino-btn img { width: 100%; height: 80%; object-fit: contain; }

        .next-btn { background: #fff; color: red; border: 2px solid #000; padding: 15px; width: 100%; border-radius: 12px; font-weight: 740; cursor: pointer; }
        .next-btn:disabled { background: #000; border-color: #000; }

        #analysis-box { width: 100%; text-align: center; margin-top: 10px; }
        #analysis-gif { width: 100%; height: 200px; border-radius: 10px; border: 2px solid #333; }
        #analysis-log { 
            width: 100%; background: #fffff; color: red; padding: 10px; border-radius: 10px; 
            font-weight: bold; border: 1px solid #000; margin-top: 5px; box-sizing: border-box; 
        }

        /* Botones contacto con iconos */
        .contact-row { display: flex; gap: 10px; width: 100%; margin-top: 10px; }
        .contact-btn { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #fff; font-weight: bold; cursor: pointer; text-decoration: none; text-align: center; color: red; display: flex; align-items: center; justify-content: center; gap: 8px; background: #fff; }
        .contact-btn img { width: 20px; height: 20px; }

        #login-screen { position: fixed; inset: 0; background: #000; display: flex; justify-content: center; align-items: center; z-index: 9999; padding: 20px; }
        .login-box { width: 100%; max-width: 350px; background: pink; padding: 30px; border-radius: 20px; text-align: center; }
        .login-input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 2px solid #000; box-sizing: border-box; }
        .social-btn { width: 55px; height: 50px; border: 1px solid #ccc; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; margin: 5px; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <!-- GIF ahora con ancho al 100% para que sea grande -->
        <img src="https://media.tenor.com/wFUdrz9-f84AAAAM/uuaviatorpka-aviatorpkauu.gif" 
             alt="Logo" 
             style="width: 100%; height: auto; margin-bottom: 10px; border-radius: 10px; display: block;">
        
        <h2 style="color:#000; margin-top: 0;">INICIAR SESIÓN</h2>
        <input type="text" id="user" class="login-input" placeholder="Usuario">
        <input type="password" id="pass" class="login-input" placeholder="Contraseña">
        <button onclick="login()" class="next-btn">INGRESAR</button>
        
        <div style="margin-top: 20px; display: flex; justify-content: center;">
            <button class="social-btn" id="btn-google"><img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="24"></button>
            <button class="social-btn" id="btn-apple" style="background:#000;"><img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" width="20" style="filter:invert(1);"></button>
            <button class="social-btn" id="btn-phone" style="background:#fff;"><img src="https://cdn-icons-png.flaticon.com/512/724/724664.png" width="24" style="filter:invert(1);"></button>
        </div>
        <p id="login-msg" style="color:red;"></p>
    </div>
</div>

<div class="main-container" id="app">
    <div class="app-header">
        <span onclick="location.reload()" style="float: left; cursor: pointer;">✖️</span> 
        AVIATOR PREDICTOR
        <span onclick="window.close()" style="float: right; cursor: pointer;"></span>
    </div>
    <div class="content">
        <div class="result-container">
            <div id="result-display" class="color-azul">1.00x</div>
        </div>
        
        <div class="casino-grid" id="grid">
            <div class="casino-btn" onclick="selCas(this)"><img src="https://image2url.com/r2/default/images/1772156226188-84436544-df13-4900-9c0a-4922454ac35a.jpg"></div>
            <div class="casino-btn" onclick="selCas(this)"><img src="https://image2url.com/r2/default/images/1772156718063-9d7f327c-3f38-4c54-a4af-8b6902096337.png"></div>
            <div class="casino-btn" onclick="selCas(this)"><img src="https://image2url.com/r2/default/images/1772156777400-140ec198-b410-4c90-963e-b6a7b3b8ffe5.png"></div>
            <div class="casino-btn" onclick="selCas(this)"><img src="https://image2url.com/r2/default/images/1772156881655-81bb1ea5-ffc0-4f39-9b03-e596eb0da86e.png"></div>
            <div class="casino-btn" onclick="selCas(this)"><img src="https://image2url.com/r2/default/images/1772156926302-a55f9d48-c419-40a3-bdbc-2a320d061d87.png"></div>
            <div class="casino-btn" onclick="selCas(this)"><img src="https://image2url.com/r2/default/images/1772157099303-685401df-2dba-48d6-ad22-89115f5dfb1b.png"></div>
            <div class="casino-btn" onclick="selCas(this)"><img src="https://image2url.com/r2/default/images/1772738281198-f4289bac-a801-45ef-aa4a-c118d4141b1e.jpg"></div>
            <div class="casino-btn" onclick="selCas(this)"><img src="https://image2url.com/r2/default/images/1772738642227-ffa57d40-8d47-4331-a396-e4c8afa35a3b.png"></div>
            <div class="casino-btn" onclick="selCas(this)"><img src="https://image2url.com/r2/default/images/1772157291495-d6069e42-b827-4bc1-add5-4e7fb9a90656.jpg"></div>
            <div class="casino-btn" onclick="selCas(this)"><img src="https://image2url.com/r2/default/images/1772157380024-78169a5a-68bd-4a96-b234-d773ddd3cff5.png"></div>
        </div>
        
        <button class="next-btn" id="btn" onclick="runSequence()" disabled>Siguiente Ronda</button>
        
        <div id="analysis-box">
            <img id="analysis-gif" src="https://media.tenor.com/N02aeghYzkoAAAAM/entrada-confirmada.gif" alt="Analizando">
            <div id="analysis-log">Predictor</div>
        </div>

        <div class="contact-row">
            <a href="#" class="contact-btn btn-tele"><img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg"> TELEGRAM</a>
            <a href="#" class="contact-btn btn-wapp"><img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg"> WHATSAPP</a>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, OAuthProvider } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
    const app = initializeApp({ apiKey: "AIzaSyB0bBiBSkHFBoj-JolMIB_A45COlpDB6eQ", authDomain: "predictor-db1e8.firebaseapp.com", projectId: "predictor-db1e8", storageBucket: "predictor-db1e8.firebasestorage.app", messagingSenderId: "492639008991", appId: "1:492639008991:web:a0beaab02247a7465a516a" });
    const auth = getAuth(app);
    document.getElementById("btn-google").onclick = () => signInWithPopup(auth, new GoogleAuthProvider()).then(() => location.reload());
    document.getElementById("btn-apple").onclick = () => signInWithPopup(auth, new OAuthProvider('apple.com')).then(() => location.reload());
    document.getElementById("btn-phone").onclick = () => alert("Autenticación por teléfono en proceso.");
</script>

<script>
    const misSenales = [1.50, 2.20, 5.00, 1.10, 3.50, 8.00, 15.00, 1.25, 4.00, 2.50];
    let roundCounter = 0;

    function login() {
        if(document.getElementById("user").value === "AVIATORPKA" && document.getElementById("pass").value === "2832092023893") {
            document.getElementById("login-screen").style.display = "none";
            document.getElementById("app").style.display = "flex";
        } else { document.getElementById("login-msg").innerText = "Credenciales incorrectas"; }
    }

    function selCas(el) {
        document.querySelectorAll('.casino-btn').forEach(b => b.classList.remove('selected'));
        el.classList.add('selected');
        document.getElementById('btn').disabled = false;
    }

    function runSequence() {
        document.getElementById('btn').disabled = true;
        let log = document.getElementById('analysis-log');
        let target = misSenales[roundCounter % misSenales.length];
        let val = 1.00;
        let d = document.getElementById('result-display');
        
        let loop = setInterval(() => {
            val += 0.05; 
            d.innerText = val.toFixed(2) + "x";
            d.className = val < 2.00 ? 'color-azul' : (val < 10.00 ? 'color-morado' : 'color-rosa');
            
            if (val < target) {
                log.innerText = "Analizando: " + val.toFixed(2) + "x...";
            }
            
            if(val >= target) { 
                d.innerText = target.toFixed(2) + "x";
                log.innerText = target.toFixed(2) + "x se fue";
                clearInterval(loop); 
                document.getElementById('btn').disabled = false; 
                roundCounter++;
            }
        }, 150);
    }

  // Inicialización de la aplicación
cargarUsuario();

// 1. Bloqueo de Clic Derecho
document.addEventListener('contextmenu', event => event.preventDefault());

// 2. Bloqueo de atajos de teclado para inspección
document.addEventListener('keydown', function(event) {
    if (event.key === 'F12') {
        event.preventDefault();
    }
    
    if (event.ctrlKey) {
        if (
            event.key === 'u' || event.key === 'U' || 
            event.key === 's' || event.key === 'S' ||
            event.key === 'p' || event.key === 'P' ||
            (event.shiftKey && (event.key === 'I' || event.key === 'i' || event.key === 'J' || event.key === 'j' || event.key === 'C' || event.key === 'c'))
        ) {
            event.preventDefault();
            event.stopPropagation();
            return false;
        }
    }
});

</script>
</body>
</html>
