<!DOCTYPE html>

    <style>
        * { box-sizing: border-box; }
        :root { --primary: #fffff; }
        body { margin: 0; padding: 0; font-family: sans-serif; display: flex; justify-content: center; min-height: 100vh; background-image: url('https://media.tenor.com/69TGJF8dxZIAAAAM/fondo-de-pantalla.gif'); background-size: cover; background-position: center; }
        .main-container { width: 100%; max-width: 470px; min-height: 100vh; background: rgba(0, 0, 0, 0); display: none; flex-direction: column; }
        .app-header { background: var(--primary); padding: 15px; color: red; text-align: center; font-weight: bold; }
        .content { flex: 1; padding: 5px; display: flex; flex-direction: column; align-items: center; gap: 10px; width: 100%; }
        
        #history-bar { display: flex; gap: 5px; margin-bottom: 10px; width: 100%; justify-content: center; }
        .hist-box { width: 40px; height: 25px; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; color: #fff; border: 1px solid #000; }
        
        .casino-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; width: 100%; max-width: 400px; margin: 0 auto; }
        .casino-btn { aspect-ratio: 1 / 1; border: 2px solid #000; border-radius: 8px; cursor: pointer; background: #fffff; padding: 5px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .casino-btn.selected { border-color: #FF0000; transform: scale(1.05); }
        .casino-btn img { width: 100%; height: 100%; object-fit: contain; }

        .next-btn { background: #FF0000; color: red; border: none; padding: 15px; width: 100%; max-width: 400px; border-radius: 12px; font-weight: bold; cursor: pointer; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px; }

        /* EFECTO RAYO DENTRO DEL CONTENEDOR */
        .gif-wrapper { position: relative; display: inline-block; width: 100%; overflow: hidden; border-radius: 10px; border: 2px solid #FF0000; }
        .lightning-active::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.7), transparent);
            animation: rayo-interno 0.5s linear infinite;
            pointer-events: none;
            z-index: 10;
        }
        @keyframes rayo-interno {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        #analysis-box { width: 100%; max-width: 400px; text-align: center; }
        #analysis-gif { width: 100%; height: auto; max-height: 180px; display: block; }
        #analysis-log { width: 100%; background: #FF0000; color: black; padding: 10px; border-radius: 10px; font-weight: bold; margin-top: 5px; }

        #login-screen { position: fixed; inset: 0; background: #FF000080; display: flex; justify-content: center; align-items: center; z-index: 9999; padding: 20px; }
        .login-box { width: 100%; max-width: 350px; background: pink; padding: 25px; border-radius: 20px; text-align: center; }
        .login-input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 2px solid #000; }
        .color-azul { color: #00bfff; }
        .color-morado { color: #bc13fe; }
        .color-rosa { color: #ff007f; }
        #result-display { font-size: 50px; font-weight: 900; margin: 10px 0; color: white; }
        .btn-amarillo { background: linear-gradient(to bottom, #F5CF27, #000); color: #FF0000; border: none; padding: 15px; width: 100%; max-width: 400px; border-radius: 12px; font-weight: 900; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 4px 15px rgba(245, 207, 39, 0.4); text-transform: uppercase; }
        .btn-amarillo:disabled { background: #1a1a1a; color: #555; border: 2px solid #333; }
        .btn-salir { background: transparent; color: #fff; border: 2px solid #333; padding: 12px; border-radius: 50px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 15px; }
   
    .app-header {
    /* Mantenemos tu diseño limpio */
    font-weight: bold;
    letter-spacing: 2px;
    padding: 15px;
    
    /* Animación sutil de entrada */
    opacity: 0;
    animation: fadeInSlide 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
}

@keyframes fadeInSlide {
    0% {
        opacity: 0;
        transform: translateY(-10px);
    }
    100% {
        opacity: 1;
        transform: translateY(0);
    }
}
    </style>
</head>
<body>

            <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" width="20" style="filter:invert(1);"> 𝗧𝗘𝗟𝗘𝗚𝗥𝗔𝗠

            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="20" style="filter:invert(1);"> 𝗪𝗛𝗔𝗧𝗦𝗔𝗣𝗣

</div>

        <div class="casino-grid" id="grid">

            <div class="casino-btn" onclick="selCas(this)"><img src="https://image2url.com/r2/default/images/1772156718063-9d7f327c-3f38-4c54-a4af-8b6902096337.png"></div>

            <div class="casino-btn" onclick="selCas(this)"><img src="https://image2url.com/r2/default/images/1772156881655-81bb1ea5-ffc0-4f39-9b03-e596eb0da86e.png"></div>
            <div class="casino-btn" onclick="selCas(this)"><img src="https://image2url.com/r2/default/images/1772156926302-a55f9d48-c419-40a3-bdbc-2a320d061d87.png"></div>
            <div class="casino-btn" onclick="selCas(this)"><img src="https://th.bing.com/th?q=Logo+Betmexico&w=120&h=120&c=1&rs=1&qlt=70&r=0&o=7&cb=1&pid=InlineBlock&rm=3&mkt=es-MX&cc=MX&setlang=es&adlt=moderate&t=1&mw=247"></div>
            <div class="casino-btn" onclick="selCas(this)"><img src="https://image2url.com/r2/default/images/1772738281198-f4289bac-a801-45ef-aa4a-c118d4141b1e.jpg"></div>
            <div class="casino-btn" onclick="selCas(this)"><img src="https://image2url.com/r2/default/images/1772738642227-ffa57d40-8d47-4331-a396-e4c8afa35a3b.png"></div>
            <div class="casino-btn" onclick="selCas(this)"><img src="https://th.bing.com/th?q=Apuesta+Total+Blanco+Y+Negro&w=120&h=120&c=1&rs=1&qlt=70&r=0&o=7&cb=1&pid=InlineBlock&rm=3&mkt=es-MX&cc=MX&setlang=es&adlt=moderate&t=1&mw=247"></div>

        <button class="btn-amarillo" id="btn" onclick="iniciarSecuencia()" disabled>SIGUIENTE RONDA</button>

        <div id="analysis-box">
            <div id="gif-container" class="gif-wrapper">
                <img id="analysis-gif" src="https://media.tenor.com/N02aeghYzkoAAAAM/entrada-confirmada.gif">

</div>

<script>
    const misSenales = [6.94, 6.78, 4.59, 2.22, 1.67, 3.21, 1.44];
    const gifsRonda = [
        "https://www.image2url.com/r2/default/images/1784580046737-f9f9a26c-0d23-4a63-b2da-ae9f94dedb74.png", 
        "https://www.image2url.com/r2/default/images/1784580135872-6830afab-7342-49f9-9da6-dcecc83d2cbd.png", 
        "https://www.image2url.com/r2/default/images/1784580229810-2e72f932-1f03-4bb9-8746-80c6a79a0c52.png", 
        "https://www.image2url.com/r2/default/images/1784580323948-ee5b7e54-5d23-406f-a07a-f1de7e5dfd9a.png", 
        "https://www.image2url.com/r2/default/images/1784580663721-5294a5e7-c5a7-4079-88b9-db7dc8a31a4f.png", 
        "https://www.image2url.com/r2/default/images/1784580804372-09d31108-7029-44cf-88d1-88c50770b80b.png",
        "https://www.image2url.com/r2/default/images/1784581046735-b0b542e7-dc07-4ae3-8f66-c6ff27aa8354.png"
    ];
    let roundCounter = 0;

    function login() {
        if(document.getElementById("user").value === "AVIATORPKA" && document.getElementById("pass").value === "AVIATORPKA") {
            document.getElementById("login-screen").style.display = "none";
            document.getElementById("app").style.display = "flex";
        } else { document.getElementById("login-msg").innerText = "Credenciales incorrectas"; }
    }

    function selCas(el) {
        document.querySelectorAll('.casino-btn').forEach(b => b.classList.remove('selected'));
        el.classList.add('selected');
        document.getElementById('btn').disabled = false;
    }

    function iniciarSecuencia() {
        document.getElementById('btn').disabled = true;
        let imgElement = document.getElementById('analysis-gif');
        let container = document.getElementById('gif-container');
        
        imgElement.src = gifsRonda[roundCounter % gifsRonda.length];
        container.classList.add('lightning-active');

        let count = 3;
        let d = document.getElementById('result-display');
        let timer = setInterval(() => {
            d.innerText = count;
            count--;
            if(count < 0) { 
                clearInterval(timer); 
                container.classList.remove('lightning-active');
                correrPrediccion(); 
            }
        }, 800);
    }

    function correrPrediccion() {
        let log = document.getElementById('analysis-log');
        let target = misSenales[roundCounter % misSenales.length];
        let val = 1.00;
        let d = document.getElementById('result-display');
        let loop = setInterval(() => {
            val += 0.08; 
            d.innerText = val.toFixed(2) + "x";
            d.className = val < 2.00 ? 'color-azul' : (val < 10.00 ? 'color-morado' : 'color-rosa');
            if(val >= target) { 
                d.innerText = target.toFixed(2) + "x";
                log.innerText = target.toFixed(2) + "x se fue";
                let bar = document.getElementById('history-bar');
                let box = document.createElement('div');
                box.className = 'hist-box';
                box.style.backgroundColor = target < 2.00 ? '#00bfff' : (target < 10.00 ? '#bc13fe' : '#ff007f');
                box.innerText = target.toFixed(2) + "✖";
                bar.prepend(box);
                if(bar.children.length > 5) bar.removeChild(bar.lastChild);
                clearInterval(loop); 
                document.getElementById('btn').disabled = false; 
                roundCounter++;
            }
        }, 120);
    }
</script>
