<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>PREDIC 1 WIN - PREMIUM</title>
    <style>
        :root {
            --primary: #E7180B;
            --bg-body: #121212;
            --app-bg: #ffffff;
            --tg-blue: #0088cc;
            --wa-green: #25D366;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            background: var(--bg-body);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .main-container {
            width: 100%;
            max-width: 500px;
            height: 100%;
            background: var(--app-bg);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        .app-header {
            background: var(--primary);
            padding: 18px 10px;
            font-size: 20px;
            font-weight: 900;
            text-align: center;
            color: white;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .history-bar {
            background: #000;
            padding: 10px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            min-height: 45px;
            align-items: center;
        }
        .history-bar::-webkit-scrollbar { display: none; }

        .payout-tag {
            font-size: 12px;
            font-weight: 900;
            padding: 4px 10px;
            border-radius: 8px;
            background: white;
            color: var(--primary);
            border: 2px solid var(--primary);
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .content {
            flex: 1;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
        }

        /* DUEÑO INFO SECTION */
        .owner-card {
            width: 100%;
            background: #f1f1f1;
            border-radius: 15px;
            padding: 12px;
            text-align: center;
            border: 1px solid #ddd;
        }
        .owner-card span { font-size: 11px; font-weight: 800; color: #555; display: block; margin-bottom: 8px; }
        .contact-row { display: flex; justify-content: center; gap: 10px; }
        .btn-c {
            text-decoration: none;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .btn-tg { background: var(--tg-blue); }
        .btn-wa { background: var(--wa-green); }

        .prediction-area {
            position: relative;
            width: 180px;
            height: 180px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        #alert-icon {
            position: absolute;
            width: 50px;
            top: -10px;
            display: none;
            z-index: 50;
            filter: drop-shadow(0 0 10px rgba(231,24,11,0.5));
            animation: pulse 0.5s infinite alternate;
        }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.2); } }

        .progress-ring { transform: rotate(-90deg); width: 180px; height: 180px; }
        .ring-bg { stroke: #e0e0e0; stroke-width: 12; fill: transparent; r: 75; cx: 90; cy: 90; }
        #prog-bar {
            stroke: var(--primary);
            stroke-width: 12;
            stroke-linecap: round;
            fill: transparent;
            r: 75; cx: 90; cy: 90;
            stroke-dasharray: 471;
            stroke-dashoffset: 471;
            transition: stroke-dashoffset 0.1s linear;
        }
        
        #result-display {
            position: absolute;
            font-size: 40px;
            font-weight: 900;
            color: var(--primary);
        }

        .casino-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            width: 100%;
        }
        
        .casino-btn {
            aspect-ratio: 1;
            border: 2px solid #ddd;
            border-radius: 12px;
            background: #f9f9f9;
            padding: 5px;
            cursor: pointer;
            transition: 0.2s;
        }
        .casino-btn img { width: 100%; height: 100%; object-fit: contain; }
        .casino-btn.selected { border-color: var(--primary); background: #fff1f0; transform: scale(1.05); }

        .next-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 18px;
            width: 100%;
            font-size: 18px;
            font-weight: 900;
            border-radius: 15px;
            box-shadow: 0 6px 0 #9e0d04;
            text-transform: uppercase;
        }
        .next-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 #9e0d04; }
        .next-btn:disabled { background: #bbb; box-shadow: none; }

        /* LOGIN SCREEN */
        #login-screen {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-box {
            background: white;
            width: 100%;
            max-width: 350px;
            padding: 35px;
            border-radius: 30px;
            text-align: center;
        }
        .login-input {
            width: 100%;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 12px;
            border: 2px solid #eee;
            font-size: 16px;
        }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSFbiXr3I7b5I4H5zry3gOObdlyQkRdXeP9fg&s" width="120">
        <h2 style="color:var(--primary); margin: 15px 0;">ADMIN PANEL</h2>
        <input id="user" type="text" placeholder="Usuario Correo" class="login-input">
        <input id="pass" type="password" placeholder="Contraseña" class="login-input">
        <button onclick="login()" class="next-btn" style="box-shadow:none;">ENTRAR</button>
        <p id="login-msg" style="color:red; font-size:12px; margin-top:10px;"></p>
    </div>
</div>

<div class="main-container">
    <div class="app-header">PREDIC 1 WIN ®</div>
    <div class="history-bar" id="historyBar"></div>

    <div class="content">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSFbiXr3I7b5I4H5zry3gOObdlyQkRdXeP9fg&s" width="140">

        <div class="owner-card">
            <span>CONTACTO OFICIAL DEL DUEÑO:</span>
            <div class="contact-row">
                <a href="https://t.me/PREDIC1WIN" class="btn-c btn-tg">TELEGRAM</a>
                <a href="https://wa.me/527719327960" class="btn-c btn-wa">WHATSAPP</a>
            </div>
        </div>

        <div class="prediction-area">
            <img id="alert-icon" src="https://images.icon-icons.com/461/PNG/96/money_43847.png">
            <svg class="progress-ring" viewBox="0 0 180 180">
                <circle class="ring-bg"/>
                <circle id="prog-bar"/>
            </svg>
            <div id="result-display">1.00x</div>
        </div>

        <div style="width:100%">
            <div style="font-size: 10px; font-weight: 800; text-align: center; margin-bottom: 8px;">SELECCIONA TU CASINO</div>
            <div class="casino-grid">
                <div class="casino-btn" onclick="selCas(this)"><img src="https://image2url.com/r2/default/images/1772156226188-84436544-df13-4900-9c0a-4922454ac35a.jpg"></div>
                <div class="casino-btn" onclick="selCas(this)"><img src="https://image2url.com/r2/default/images/1772156718063-9d7f327c-3f38-4c54-a4af-8b6902096337.png"></div>
                <div class="casino-btn" onclick="selCas(this)"><img src="https://image2url.com/r2/default/images/1772156777400-140ec198-b410-4c90-963e-b6a7b3b8ffe5.png"></div>
                <div class="casino-btn" onclick="selCas(this)"><img src="https://image2url.com/r2/default/images/1772156881655-81bb1ea5-ffc0-4f39-9b03-e596eb0da86e.png"></div>
                <div class="casino-btn" onclick="selCas(this)"><img src="https://image2url.com/r2/default/images/1772156926302-a55f9d48-c419-40a3-bdbc-2a320d061d87.png"></div>
                <div class="casino-btn" onclick="selCas(this)"><img src="https://image2url.com/r2/default/images/1772157099303-685401df-2dba-48d6-ad22-89115f5dfb1b.png"></div>
                <div class="casino-btn" onclick="selCas(this)"><img src="https://image2url.com/r2/default/images/1772157139259-9ff0140d-73a3-4141-b928-661681cb29a0.png"></div>
                <div class="casino-btn" onclick="selCas(this)"><img src="https://image2url.com/r2/default/images/1772157235100-e2589491-3023-4dd7-a3bf-f05fef4c349d.png"></div>
                <div class="casino-btn" onclick="selCas(this)"><img src="https://image2url.com/r2/default/images/1772157291495-d6069e42-b827-4bc1-add5-4e7fb9a90656.jpg"></div>
                <div class="casino-btn" onclick="selCas(this)"><img src="https://image2url.com/r2/default/images/1772157380024-78169a5a-68bd-4a96-b234-d773ddd3cff5.png"></div>
            </div>
        </div>

        <button class="next-btn" id="btn" onclick="runSequence()" disabled>GENERAR SEÑAL</button>
    </div>

    <div style="text-align:center; padding: 10px; font-size: 10px; background: #f9f9f9; border-top: 1px solid #eee; font-weight: 700;">
        ALGORITMO PROTEGIDO © 2026 - SANTIAGO PEREZ
    </div>
</div>

<script>
    const USER_CORRECTO = "predic1win@gmail.com";
    const PASS_CORRECTA = "12345678";
    
    // TUS SEÑALES EXACTAS
    const misSeñales = [1.93, 3.00, 2.00, 2.91, 1.51];
    let step = 1;

    function login(){
        if(document.getElementById("user").value === USER_CORRECTO && document.getElementById("pass").value === PASS_CORRECTA){
            document.getElementById("login-screen").style.display = "none";
        } else {
            document.getElementById("login-msg").innerText = "DATOS INVÁLIDOS";
        }
    }

    function selCas(el) {
        document.querySelectorAll('.casino-btn').forEach(b => b.classList.remove('selected'));
        el.classList.add('selected');
        document.getElementById('btn').disabled = false;
    }

    function runSequence() {
        const display = document.getElementById('result-display');
        const btn = document.getElementById('btn');
        const alertImg = document.getElementById('alert-icon');
        const progBar = document.getElementById('prog-bar');
        const history = document.getElementById('historyBar');

        btn.disabled = true;
        alertImg.style.display = "none";
        progBar.style.strokeDashoffset = 471;

        // SEÑAL ACTUAL
        const target = misSeñales[step];
        step = (step + 1) % misSeñales.length;

        let val = 1.00;
        let loop = setInterval(() => {
            val += 0.01;
            display.innerText = val.toFixed(2) + "x";

            let p = (val - 1) / (target - 1);
            progBar.style.strokeDashoffset = 471 - (p * 471);

            if (val >= target) {
                clearInterval(loop);
                display.innerText = target.toFixed(2) + "x";
                alertImg.style.display = "block";
                btn.disabled = false;

                const log = document.createElement('div');
                log.className = 'payout-tag';
                log.innerText = target.toFixed(2) + "x";
                history.prepend(log);
            }
        }, 30);
    }
</script>
</body>
</html>
