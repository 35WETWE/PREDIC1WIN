<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aviator Predictor</title>
    <style>
        * { box-sizing: border-box; }
        :root { --primary: #000; }
        body { margin: 0; padding: 0; font-family: sans-serif; display: flex; justify-content: center; min-height: 100vh; background-image: url('https://th.bing.com/th/id/OIP.DpeXCzBmCwnk0f6CJmGUFwHaNK?w=184&h=328&c=7&r=0&o=7&pid=1.7&rm=3'); background-size: cover; background-position: center; }
        .main-container { width: 100%; max-width: 470px; min-height: 100vh; background: rgba(0,0,0,0.5); display: none; flex-direction: column; }
        .app-header { background: var(--primary); padding: 15px; color: orange; text-align: center; font-weight: bold; }
        .content { flex: 1; padding: 5px; display: flex; flex-direction: column; align-items: center; gap: 15px; width: 100%; }
        
        /* Historial Cuadrado */
        #history-bar { display: flex; gap: 5px; margin-bottom: 10px; width: 100%; justify-content: center; }
        .hist-box { width: 40px; height: 25px; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; color: #000; border: 1px solid #fff; }
        
        .casino-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; width: 100%; max-width: 400px; margin: 0 auto; }
        .casino-btn { aspect-ratio: 1 / 1; border: 2px solid #F5CF27; border-radius: 8px; cursor: pointer; background: #fffff; padding: 5px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .casino-btn.selected { border-color: #F5CF27; transform: scale(1.05); }
        .casino-btn img { width: 100%; height: 100%; object-fit: contain; }

        .next-btn { background: #ff007f; color: white; border: none; padding: 15px; width: 100%; max-width: 400px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .next-btn:disabled { background: #520402; color: #red; }

        #analysis-box { width: 100%; max-width: 400px; text-align: center; }
        #analysis-gif { width: 100%; height: auto; max-height: 180px; border-radius: 10px; border: 2px solid #520402; }
        #analysis-log { width: 100%; background: #000; color: red; padding: 10px; border-radius: 10px; font-weight: bold; margin-top: 5px; }

        .contact-row { display: flex; gap: 10px; width: 100%; max-width: 400px; }
        .contact-btn { flex: 1; padding: 10px; border-radius: 10px; background: #E67F6C; color: red; text-decoration: none; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 14px; }
        .contact-btn img { width: 20px; height: 20px; }
        
        #login-screen { position: fixed; inset: 0; background: #000; display: flex; justify-content: center; align-items: center; z-index: 9999; padding: 20px; }
        .login-box { width: 100%; max-width: 350px; background: pink; padding: 25px; border-radius: 20px; text-align: center; }
        .login-input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 2px solid #000; }
        .social-btn { width: 50px; height: 50px; border: 1px solid #ccc; border-radius: 10px; cursor: pointer; margin: 5px; background: #fff; display: flex; align-items: center; justify-content: center; }

        .color-azul { color: #00bfff; }
        .color-morado { color: #bc13fe; }
        .color-rosa { color: #ff007f; }
        #result-display { font-size: 50px; font-weight: 900; margin: 10px 0; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <img src="https://media.tenor.com/wFUdrz9-f84AAAAM/uuaviatorpka-aviatorpkauu.gif" style="width: 100%; height: auto; margin-bottom: 10px; border-radius: 10px; display: block;">
        <h2 style="color:#000; margin-top: 0;">INICIAR SESIÓN</h2>
        <input type="text" id="user" class="login-input" placeholder="Usuario">
        <input type="password" id="pass" class="login-input" placeholder="Contraseña">
        
        <!-- Botón Ingresar -->
        <button onclick="login()" class="next-btn" style="background:#000; color:#fff; width: 100%; margin-bottom: 10px;">INGRESAR</button>
        
        <!-- Botones de contacto con la misma clase .next-btn -->
        <a href="https://t.me/APKPREDICTOR" target="_blank" class="next-btn" style="background:#0088cc; color:#fff; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 10px;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" width="20" style="filter:invert(1);"> TELEGRAM
        </a>
        <a href="https://wa.me/593995224036" target="_blank" class="next-btn" style="background:#25d366; color:#fff; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="20" style="filter:invert(1);"> WHATSAPP
        </a>

        <p id="login-msg" style="color:red; margin-top: 10px;"></p>
    </div>
</div>

<div class="main-container" id="app">
    <div class="app-header">𝗔 𝗣 𝗞 𝗥 𝗘 𝗗 𝗜 𝗖 𝗧 𝗢 𝗥</div>
    <div class="content">
        <div id="history-bar"></div>
        <div id="result-display" class="color-azul">𝟭.𝟬𝟬𝘅</div>
        
        <div class="casino-grid" id="grid">
            <div class="casino-btn" onclick="selCas(this)"><img src="https://image2url.com/r2/default/images/1772156226188-84436544-df13-4900-9c0a-4922454ac35a.jpg"></div>
            <div class="casino-btn" onclick="selCas(this)"><img src="https://image2url.com/r2/default/images/1772156718063-9d7f327c-3f38-4c54-a4af-8b6902096337.png"></div>
            <div class="casino-btn" onclick="selCas(this)"><img src="https://image2url.com/r2/default/images/1772156777400-140ec198-b410-4c90-963e-b6a7b3b8ffe5.png"></div>
            <div class="casino-btn" onclick="selCas(this)"><img src="https://image2url.com/r2/default/images/1772156881655-81bb1ea5-ffc0-4f39-9b03-e596eb0da86e.png"></div>
            <div class="casino-btn" onclick="selCas(this)"><img src="https://image2url.com/r2/default/images/1772156926302-a55f9d48-c419-40a3-bdbc-2a320d061d87.png"></div>
            <div class="casino-btn" onclick="selCas(this)"><img src="https://th.bing.com/th?q=Logo+Betmexico&w=120&h=120&c=1&rs=1&qlt=70&r=0&o=7&cb=1&pid=InlineBlock&rm=3&mkt=es-MX&cc=MX&setlang=es&adlt=moderate&t=1&mw=247"></div>
            <div class="casino-btn" onclick="selCas(this)"><img src="https://image2url.com/r2/default/images/1772738281198-f4289bac-a801-45ef-aa4a-c118d4141b1e.jpg"></div>
            <div class="casino-btn" onclick="selCas(this)"><img src="https://image2url.com/r2/default/images/1772738642227-ffa57d40-8d47-4331-a396-e4c8afa35a3b.png"></div>
            <div class="casino-btn" onclick="selCas(this)"><img src="https://th.bing.com/th?q=Apuesta+Total+Blanco+Y+Negro&w=120&h=120&c=1&rs=1&qlt=70&r=0&o=7&cb=1&pid=InlineBlock&rm=3&mkt=es-MX&cc=MX&setlang=es&adlt=moderate&t=1&mw=247"></div>
            <div class="casino-btn" onclick="selCas(this)"><img src="https://image2url.com/r2/default/images/1772157380024-78169a5a-68bd-4a96-b234-d773ddd3cff5.png"></div>
        </div>
        
        <button class="next-btn" id="btn" onclick="iniciarSecuencia()" disabled>Siguiente Ronda</button>
        
        <div id="analysis-box">
            <img id="analysis-gif" src="https://media.tenor.com/N02aeghYzkoAAAAM/entrada-confirmada.gif">
            <div id="analysis-log">P R E D I C T O R </div>
        </div>
    </div>
</div>

<script>
    const misSenales = [3.38, 1.52, 9.99, 2.07, 3.65, 1.03];
    
    // AQUÍ PONES TUS 10 URLs EN ORDEN:
    const gifsRonda = [
        "https://www.image2url.com/r2/default/images/1784324317210-d3534e4c-aef6-47d4-bbf2-efc6bdb334cf.png", "https://www.image2url.com/r2/default/images/1784324676379-7ea47be5-c447-4c33-aece-d963d8ec740c.png", "https://www.image2url.com/r2/default/images/1784324742377-a0b02c7e-789a-46f1-9de4-39deda028b57.png", "https://www.image2url.com/r2/default/images/1784324791080-e15afdee-d802-427e-8781-9eaa83a6748e.png", "https://www.image2url.com/r2/default/images/1784324900633-741a89c1-9fe6-4233-bb7a-11140f2f0961.png", 
        "https://www.image2url.com/r2/default/images/1784325191245-711cdf1b-13c2-4aaf-b275-80ab622ee50a.png", "URL_7", "URL_8", "URL_9", "URL_10"
    ];
    
    let roundCounter = 0;

    function login() {
        if(document.getElementById("user").value === "AVIATORPKA" && document.getElementById("pass").value === "AVIATORPKA") {
            document.getElementById("login-screen").style.display = "none";
            document.getElementById("app").style.display = "flex";
        } else { document.getElementById("login-msg").innerText = "Credenciales incorrectas"; }
    }

    function selCas(el) {
        document.querySelectorAll('.casino-btn').forEach(b => b.classList.remove('selected'));
        el.classList.add('selected');
        document.getElementById('btn').disabled = false;
    }

    function iniciarSecuencia() {
        document.getElementById('btn').disabled = true;
        let d = document.getElementById('result-display');
        let count = 3;
        
        // Al iniciar, cambiamos el GIF según el roundCounter
        document.getElementById('analysis-gif').src = gifsRonda[roundCounter % gifsRonda.length];

        let timer = setInterval(() => {
            d.innerText = count;
            count--;
            if(count < 0) {
                clearInterval(timer);
                correrPrediccion();
            }
        }, 800);
    }

    function correrPrediccion() {
        let log = document.getElementById('analysis-log');
        let target = misSenales[roundCounter % misSenales.length];
        let val = 1.00;
        let d = document.getElementById('result-display');
        
        let loop = setInterval(() => {
            val += 0.08; 
            d.innerText = val.toFixed(2) + "x";
            d.className = val < 2.00 ? 'color-azul' : (val < 10.00 ? 'color-morado' : 'color-rosa');
            
            if(val >= target) { 
                d.innerText = target.toFixed(2) + "x";
                log.innerText = target.toFixed(2) + "x se fue";
                
                let bar = document.getElementById('history-bar');
                let box = document.createElement('div');
                box.className = 'hist-box';
                box.style.backgroundColor = target < 2.00 ? '#00bfff' : (target < 10.00 ? '#bc13fe' : '#ff007f');
                box.innerText = target.toFixed(2) + "x";
                bar.prepend(box);
                if(bar.children.length > 5) bar.removeChild(bar.lastChild);

                clearInterval(loop); 
                document.getElementById('btn').disabled = false; 
                roundCounter++; // Aumenta el contador para la siguiente ronda
            }
        }, 120);
    }
  // Desactivar clic derecho
    document.addEventListener('contextmenu', event => event.preventDefault());

    // Desactivar combinaciones de teclas (F12, Ctrl+U, Ctrl+Shift+I)
    document.addEventListener('keydown', event => {
        if (event.keyCode === 123 || // F12
            (event.ctrlKey && event.shiftKey && (event.keyCode === 73 || event.keyCode === 74 || event.keyCode === 67)) || // Ctrl+Shift+I/J/C
            (event.ctrlKey && event.keyCode === 85)) { // Ctrl+U
            event.preventDefault();
            return false;
        }
    });
</script>
</body>
</html>
