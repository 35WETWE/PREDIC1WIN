<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <style>
        :root {
            --primary: #E7180B;
            --primary-dark: #9e0d04;
            --bg-dark: #0a0a0a;
            --app-white: #ffffff;
            --tg-blue: #0088cc;
            --wa-green: #25D366;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg-dark);
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
        }

        /* LOGIN OVERLAY */
        #auth-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: opacity 0.5s ease;
        }

        .auth-card {
            background: white;
            width: 100%;
            max-width: 380px;
            padding: 30px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
        }

        .auth-card h2 {
            color: var(--primary);
            margin: 15px 0;
            font-weight: 900;
            font-size: 22px;
        }

        .auth-input {
            width: 100%;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 12px;
            border: 2px solid #edf2f7;
            font-size: 16px;
            font-weight: 600;
        }

        /* MAIN APP */
        .main-wrapper {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            height: 100dvh;
            background: var(--app-white);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .premium-header {
            background: var(--primary);
            padding: 15px 5px;
            text-align: center;
            z-index: 10;
        }

        .premium-header h1 {
            color: white;
            font-size: 20px;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .history-container {
            background: #000;
            padding: 10px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            min-height: 50px;
            align-items: center;
            border-bottom: 3px solid var(--primary);
        }
        .history-container::-webkit-scrollbar { display: none; }

        .signal-pill {
            background: white;
            color: var(--primary);
            font-size: 13px;
            font-weight: 900;
            padding: 4px 12px;
            border-radius: 10px;
            border: 2px solid var(--primary);
            white-space: nowrap;
        }

        .app-content {
            flex: 1;
            padding: 10px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between; /* Distribuye elementos uniformemente */
        }

        .brand-zone img {
            width: 90px;
            margin-bottom: 5px;
        }

        .admin-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 10px;
            width: 100%;
            border: 1px solid #e9ecef;
        }

        .social-link {
            text-decoration: none;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 800;
        }
        .social-link.tg { background: var(--tg-blue); }
        .social-link.wa { background: var(--wa-green); }

        /* ENGINE - REDUCIDO PARA QUE QUEPA */
        .engine-zone {
            position: relative;
            width: 160px;
            height: 160px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .ring-canvas {
            transform: rotate(-90deg);
            width: 160px;
            height: 160px;
        }

        .track-layer {
            stroke: #edf2f7;
            stroke-width: 12;
            fill: none;
            r: 65; cx: 80; cy: 80;
        }

        #progress-layer {
            stroke: var(--primary);
            stroke-width: 12;
            stroke-linecap: round;
            fill: none;
            r: 65; cx: 80; cy: 80;
            stroke-dasharray: 408; 
            stroke-dashoffset: 408;
            transition: stroke-dashoffset 0.1s linear;
        }

        .value-display {
            position: absolute;
            font-size: 38px;
            font-weight: 900;
            color: var(--primary);
        }

        /* CASINOS - SIN FONDO BLANCO */
        .casino-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            width: 100%;
        }

        .casino-slot {
            aspect-ratio: 1;
            background: transparent; /* CORRECCIÓN FONDO */
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .casino-slot img { width: 100%; height: 100%; object-fit: contain; }
        .casino-slot.active { border-color: var(--primary); background: rgba(231,24,11,0.05); }

        .action-button {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 900;
            text-transform: uppercase;
            box-shadow: 0 5px 0 var(--primary-dark);
            cursor: pointer;
        }

        .action-button:active { transform: translateY(3px); box-shadow: 0 2px 0 var(--primary-dark); }
        .action-button:disabled { background: #ccc; box-shadow: none; color: #777; }

        .system-footer {
            text-align: center;
            padding: 10px;
            background: #f8f9fa;
            font-size: 9px;
            font-weight: 800;
            color: #aaa;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>

        <div class="casino-selection" style="width:100%;">
            <p style="font-size:9px; text-align:center; font-weight:900; color:#888; margin-bottom:8px;">SINCRONIZAR SERVIDOR</p>

<script>
    const ADMIN_USER = "predic1win@gmail.com";
    const ADMIN_PASS = "12345678";
    const SIGNALS_QUEUE = [1.93, 3.00, 2.00, 2.91, 1.51]; 
    let currentStep = 0;
    const MAX_DASH = 408;

    function validateAccess() {
        const email = document.getElementById('u_mail').value;
        const pass = document.getElementById('u_pass').value;
        if(email === ADMIN_USER && pass === ADMIN_PASS) {
            document.getElementById('auth-overlay').style.opacity = '0';
            setTimeout(() => document.getElementById('auth-overlay').style.display = 'none', 500);
        } else {
            document.getElementById('auth-err').innerText = "ERROR DE ACCESO";
        }
    }

    function syncCasino(element) {
        document.querySelectorAll('.casino-slot').forEach(slot => slot.classList.remove('active'));
        element.classList.add('active');
        document.getElementById('predictBtn').disabled = false;
    }

    function executeAlgorithm() {
        const btn = document.getElementById('predictBtn');
        const display = document.getElementById('multiplier');
        const ring = document.getElementById('progress-layer');
        const history = document.getElementById('historyLog');

        btn.disabled = true;
        ring.style.strokeDashoffset = MAX_DASH;

        let targetValue = SIGNALS_QUEUE[currentStep];
        currentStep = (currentStep + 1) % SIGNALS_QUEUE.length;

        let counter = 1.00;
        let process = setInterval(() => {
            counter += 0.01;
            display.innerText = counter.toFixed(2) + "x";
            let percentage = (counter - 1) / (targetValue - 1);
            ring.style.strokeDashoffset = MAX_DASH - (percentage * MAX_DASH);

            if (counter >= targetValue) {
                clearInterval(process);
                display.innerText = targetValue.toFixed(2) + "x";
                btn.disabled = false;
                const logEntry = document.createElement('div');
                logEntry.className = 'signal-pill';
                logEntry.innerText = targetValue.toFixed(2) + "x";
                history.prepend(logEntry);
            }
        }, 30);
    }
</script>
